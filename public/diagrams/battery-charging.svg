<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc2222"/>
    </marker>
    <marker id="arrowBk" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a8a1a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f8f8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="55" fill="#2c0a3a"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">MARINE BATTERY CHARGING SYSTEM</text>
  <text x="400" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d0a0f0">Alternator + Shore Power Charger — DC Charging Circuit</text>

  <!-- SECTION LABELS -->
  <text x="160" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#cc7700">ENGINE CHARGING</text>
  <text x="620" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a8a1a">SHORE POWER CHARGING</text>

  <!-- ===== ALTERNATOR ===== -->
  <rect x="30" y="100" width="120" height="75" rx="6" fill="#ffe8e8" stroke="#cc7700" stroke-width="2.5"/>
  <text x="90" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a2000">ALTERNATOR</text>
  <text x="90" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Engine-driven</text>
  <text x="90" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">13.8–14.4V output</text>
  <text x="90" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">40–120A typical</text>
  <!-- alternator symbol circle -->
  <circle cx="90" cy="135" r="12" fill="none" stroke="#cc7700" stroke-width="1.5"/>
  <text x="90" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cc7700">~</text>

  <!-- Alternator → main fuse -->
  <line x1="150" y1="137" x2="195" y2="137" stroke="#cc2222" stroke-width="3" marker-end="url(#arrowR)"/>

  <!-- ALT FUSE -->
  <rect x="195" y="120" width="75" height="40" rx="5" fill="#ffe8e8" stroke="#cc2222" stroke-width="2"/>
  <text x="232" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a0000">ALT FUSE</text>
  <text x="232" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">100–150A MEGA</text>
  <!-- fuse element -->
  <rect x="218" y="125" width="28" height="8" rx="2" fill="none" stroke="#cc2222" stroke-width="1.5"/>

  <!-- Fuse → battery isolator -->
  <line x1="270" y1="140" x2="315" y2="175" stroke="#cc2222" stroke-width="3" marker-end="url(#arrowR)"/>

  <!-- ===== BATTERY ISOLATOR / COMBINER ===== -->
  <rect x="315" y="165" width="145" height="95" rx="6" fill="#fff0d0" stroke="#cc7700" stroke-width="2.5"/>
  <text x="387" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a2000">BATTERY ISOLATOR</text>
  <text x="387" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Diode or VSR type</text>
  <text x="387" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Prevents cross-discharge</text>
  <text x="387" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Output A → House</text>
  <text x="387" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Output B → Start</text>
  <!-- diode symbols -->
  <path d="M353 195 L363 200 L353 205 Z" fill="#cc7700"/>
  <line x1="363" y1="195" x2="363" y2="205" stroke="#cc7700" stroke-width="1.5"/>
  <path d="M353 220 L363 225 L353 230 Z" fill="#cc7700"/>
  <line x1="363" y1="220" x2="363" y2="230" stroke="#cc7700" stroke-width="1.5"/>

  <!-- Isolator → House Bank -->
  <line x1="460" y1="195" x2="520" y2="195" stroke="#cc2222" stroke-width="3" marker-end="url(#arrowR)"/>
  <text x="490" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#cc2222" font-weight="bold">+</text>

  <!-- Isolator → Start Battery (down) -->
  <line x1="387" y1="260" x2="387" y2="295" stroke="#cc2222" stroke-width="2.5"/>
  <line x1="387" y1="295" x2="575" y2="295" stroke="#cc2222" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="480" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#cc2222">to START battery</text>

  <!-- ===== HOUSE BANK ===== -->
  <rect x="520" y="160" width="145" height="90" rx="6" fill="#ffe8e8" stroke="#cc2222" stroke-width="2.5"/>
  <text x="592" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a0000">HOUSE BANK</text>
  <text x="592" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2–4× AGM/Lithium</text>
  <text x="592" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">200–400Ah typical</text>
  <text x="592" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Powers all house loads</text>
  <text x="592" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">Lights, electronics, pumps</text>
  <!-- battery symbol -->
  <line x1="565" y1="175" x2="620" y2="175" stroke="#cc2222" stroke-width="2"/>
  <line x1="570" y1="179" x2="615" y2="179" stroke="#cc2222" stroke-width="1"/>
  <text x="555" y="180" font-family="Arial, sans-serif" font-size="12" fill="#cc2222" font-weight="bold">+</text>
  <text x="625" y="180" font-family="Arial, sans-serif" font-size="12" fill="#333">−</text>

  <!-- ===== START BATTERY ===== -->
  <rect x="575" y="270" width="145" height="80" rx="6" fill="#ffe8e8" stroke="#cc2222" stroke-width="2.5"/>
  <text x="647" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a0000">START BATTERY</text>
  <text x="647" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1× CCA-rated</text>
  <text x="647" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Engine crank only</text>
  <text x="647" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#888">Always keep charged</text>
  <!-- battery symbol -->
  <line x1="620" y1="285" x2="675" y2="285" stroke="#cc2222" stroke-width="2"/>
  <line x1="625" y1="289" x2="670" y2="289" stroke="#cc2222" stroke-width="1"/>

  <!-- ===== SHORE POWER CHARGER ===== -->
  <rect x="30" y="310" width="140" height="85" rx="6" fill="#e0ffe0" stroke="#1a8a1a" stroke-width="2.5"/>
  <text x="100" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#003a00">SHORE POWER</text>
  <text x="100" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#003a00">BATTERY CHARGER</text>
  <text x="100" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">AC → DC converter</text>
  <text x="100" y="377" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">3-stage smart charger</text>
  <text x="100" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">30–80A output</text>
  <!-- AC input symbol -->
  <text x="45" y="330" font-family="Arial, sans-serif" font-size="9" fill="#1a8a1a">120VAC</text>
  <text x="45" y="341" font-family="Arial, sans-serif" font-size="9" fill="#1a8a1a">IN →</text>

  <!-- Shore charger → House bank (charging output) -->
  <line x1="170" y1="353" x2="300" y2="353" stroke="#1a8a1a" stroke-width="2.5"/>
  <line x1="300" y1="353" x2="300" y2="205" stroke="#1a8a1a" stroke-width="2.5"/>
  <line x1="300" y1="205" x2="520" y2="205" stroke="#1a8a1a" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="235" y="345" font-family="Arial, sans-serif" font-size="9" fill="#1a8a1a" font-weight="bold">CHARGE +</text>

  <!-- Shore power input at left -->
  <rect x="30" y="420" width="140" height="45" rx="5" fill="#e0ffe0" stroke="#1a8a1a" stroke-width="1.5"/>
  <text x="100" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#003a00">SHORE POWER INLET</text>
  <text x="100" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">30A or 50A connector</text>
  <line x1="100" y1="420" x2="100" y2="395" stroke="#1a8a1a" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- FUSE on house bank positive -->
  <rect x="465" y="175" width="55" height="30" rx="4" fill="#ffe8e8" stroke="#cc2222" stroke-width="1.5"/>
  <text x="492" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#4a0000">FUSE</text>
  <text x="492" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#555">150A MEGA</text>

  <!-- Ground bus bar -->
  <rect x="315" y="380" width="350" height="35" rx="4" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <text x="490" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#222">NEGATIVE BUS BAR / GROUND</text>
  <text x="490" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">All negative returns connect here</text>

  <!-- Ground connections from batteries to bus bar -->
  <line x1="592" y1="250" x2="592" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrowBk)"/>
  <line x1="647" y1="350" x2="647" y2="380" stroke="#333" stroke-width="2" marker-end="url(#arrowBk)"/>

  <!-- Ground from isolator to bus bar -->
  <line x1="387" y1="260" x2="387" y2="380" stroke="#333" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBk)"/>

  <!-- LEGEND -->
  <rect x="210" y="390" width="100" height="95" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="260" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">LEGEND</text>
  <line x1="220" y1="420" x2="245" y2="420" stroke="#cc2222" stroke-width="2.5" marker-end="url(#arrowR)"/>
  <text x="250" y="423" font-family="Arial, sans-serif" font-size="8" fill="#333">+12V DC</text>
  <line x1="220" y1="434" x2="245" y2="434" stroke="#333" stroke-width="2"/>
  <text x="250" y="437" font-family="Arial, sans-serif" font-size="8" fill="#333">Negative/GND</text>
  <line x1="220" y1="448" x2="245" y2="448" stroke="#1a8a1a" stroke-width="2.5"/>
  <text x="250" y="451" font-family="Arial, sans-serif" font-size="8" fill="#333">Shore Charge</text>
  <text x="220" y="465" font-family="Arial, sans-serif" font-size="7" fill="#d4110a">⚠ Fuse within 7" of + terminal</text>
  <text x="220" y="476" font-family="Arial, sans-serif" font-size="7" fill="#d4110a">⚠ ABYC Standard E-11</text>
</svg>
