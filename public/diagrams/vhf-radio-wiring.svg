<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" style="background:#fff;font-family:Arial,sans-serif;">
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">VHF Radio Wiring</text>

  <!-- Battery -->
  <rect x="30" y="250" width="100" height="65" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="273" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY</text>
  <text x="80" y="288" text-anchor="middle" font-size="9" fill="#555">12V DC</text>
  <line x1="45" y1="295" x2="70" y2="295" stroke="#333" stroke-width="3"/>
  <line x1="49" y1="302" x2="66" y2="302" stroke="#333" stroke-width="1.5"/>
  <text x="33" y="265" font-size="12" fill="#cc0000" font-weight="bold">+</text>
  <text x="33" y="310" font-size="12" fill="#000" font-weight="bold">−</text>

  <!-- Positive wire -->
  <line x1="80" y1="250" x2="80" y2="200" stroke="#cc0000" stroke-width="2"/>
  <line x1="80" y1="200" x2="240" y2="200" stroke="#cc0000" stroke-width="2"/>
  <!-- Fuse -->
  <rect x="240" y="190" width="30" height="20" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="255" y="186" text-anchor="middle" font-size="9" fill="#555">5A</text>
  <line x1="270" y1="200" x2="360" y2="200" stroke="#cc0000" stroke-width="2"/>
  <text x="180" y="190" text-anchor="middle" font-size="9" fill="#888">14 AWG RED</text>

  <!-- VHF Radio -->
  <rect x="360" y="160" width="180" height="130" rx="8" fill="#e8e8f0" stroke="#333" stroke-width="2"/>
  <text x="450" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">VHF RADIO</text>
  <text x="450" y="205" text-anchor="middle" font-size="10" fill="#555">Marine VHF Transceiver</text>
  <!-- display simulation -->
  <rect x="375" y="212" width="150" height="40" rx="3" fill="#002200" stroke="#00aa00" stroke-width="1"/>
  <text x="450" y="228" text-anchor="middle" font-size="10" fill="#00ff00">CH 16  156.800</text>
  <text x="450" y="243" text-anchor="middle" font-size="9" fill="#009900">1W / 25W</text>
  <!-- connector labels -->
  <text x="368" y="272" font-size="9" fill="#333">PWR+</text>
  <text x="368" y="285" font-size="9" fill="#333">PWR−</text>
  <text x="500" y="165" font-size="9" fill="#333">ANT</text>
  <text x="550" y="215" font-size="9" fill="#333">SPK</text>
  <text x="368" y="260" font-size="9" fill="#333">GND</text>
  <!-- terminal dots -->
  <circle cx="360" cy="200" r="4" fill="#cc0000"/>
  <circle cx="360" cy="270" r="4" fill="#000"/>
  <circle cx="450" cy="160" r="4" fill="#333"/>
  <circle cx="540" cy="215" r="4" fill="#cc6600"/>

  <!-- Negative / Ground wire -->
  <line x1="360" y1="270" x2="200" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="200" y1="270" x2="200" y2="480" stroke="#000" stroke-width="2"/>
  <line x1="200" y1="480" x2="80" y2="480" stroke="#000" stroke-width="2"/>
  <line x1="80" y1="480" x2="80" y2="315" stroke="#000" stroke-width="2"/>
  <text x="220" y="390" font-size="9" fill="#888">14 AWG BLK</text>

  <!-- Ground symbol -->
  <line x1="80" y1="480" x2="80" y2="510" stroke="#000" stroke-width="2"/>
  <line x1="62" y1="510" x2="98" y2="510" stroke="#000" stroke-width="2.5"/>
  <line x1="67" y1="518" x2="93" y2="518" stroke="#000" stroke-width="2"/>
  <line x1="72" y1="526" x2="88" y2="526" stroke="#000" stroke-width="1.5"/>
  <text x="80" y="542" text-anchor="middle" font-size="9" fill="#555">DC Ground</text>

  <!-- Antenna coax -->
  <line x1="450" y1="160" x2="450" y2="80" stroke="#555" stroke-width="3"/>
  <line x1="450" y1="80" x2="700" y2="80" stroke="#555" stroke-width="3"/>
  <text x="570" y="70" text-anchor="middle" font-size="9" fill="#555">RG-8X or RG-58 Coax</text>
  <!-- Antenna mast -->
  <rect x="680" y="50" width="40" height="80" rx="3" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="700" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">ANT</text>
  <text x="700" y="95" text-anchor="middle" font-size="9" fill="#555">VHF Mast</text>
  <text x="700" y="108" text-anchor="middle" font-size="9" fill="#555">3–6 dBi</text>
  <!-- antenna line -->
  <line x1="700" y1="50" x2="700" y2="30" stroke="#333" stroke-width="2"/>
  <line x1="692" y1="30" x2="708" y2="30" stroke="#333" stroke-width="2"/>
  <line x1="696" y1="24" x2="704" y2="24" stroke="#333" stroke-width="1.5"/>
  <line x1="700" y1="18" x2="700" y2="12" stroke="#333" stroke-width="1.5"/>
  <!-- coax ground braid -->
  <line x1="700" y1="130" x2="700" y2="160" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="715" y="150" font-size="9" fill="#666">Shield GND</text>
  <line x1="700" y1="160" x2="780" y2="160" stroke="#666" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="780" y="145" width="80" height="30" rx="3" fill="#f0f0f0" stroke="#666" stroke-width="1.5"/>
  <text x="820" y="163" text-anchor="middle" font-size="9" fill="#444">RF Ground</text>
  <text x="820" y="175" text-anchor="middle" font-size="8" fill="#888">Copper mesh/plate</text>

  <!-- Speaker -->
  <line x1="540" y1="215" x2="700" y2="215" stroke="#cc6600" stroke-width="2"/>
  <rect x="700" y="195" width="100" height="50" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="750" y="218" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">EXTERNAL</text>
  <text x="750" y="233" text-anchor="middle" font-size="10" fill="#333">SPEAKER</text>
  <text x="700" y="185" font-size="9" fill="#cc6600">Orange — SPK</text>

  <!-- Remote mic (dashed option) -->
  <line x1="540" y1="250" x2="700" y2="250" stroke="#660099" stroke-width="1.5" stroke-dasharray="5,3"/>
  <rect x="700" y="255" width="100" height="40" rx="5" fill="#f8f0ff" stroke="#660099" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="750" y="273" text-anchor="middle" font-size="10" fill="#660099">REMOTE MIC</text>
  <text x="750" y="286" text-anchor="middle" font-size="8" fill="#660099">(optional)</text>

  <!-- RF safety note -->
  <rect x="30" y="440" width="310" height="60" rx="5" fill="#fffbe6" stroke="#ccaa00" stroke-width="1"/>
  <text x="185" y="460" text-anchor="middle" font-size="10" font-weight="bold" fill="#665500">VHF Wiring Notes</text>
  <text x="185" y="476" text-anchor="middle" font-size="9" fill="#665500">Keep power leads as short as possible.</text>
  <text x="185" y="490" text-anchor="middle" font-size="9" fill="#665500">Use low-loss coax; minimize bends/kinks.</text>

  <!-- Legend -->
  <rect x="600" y="440" width="280" height="120" rx="5" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="740" y="458" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Wire / Cable Colors</text>
  <line x1="610" y1="472" x2="640" y2="472" stroke="#cc0000" stroke-width="2.5"/>
  <text x="645" y="476" font-size="10" fill="#333">Power + (Red)</text>
  <line x1="610" y1="490" x2="640" y2="490" stroke="#000" stroke-width="2.5"/>
  <text x="645" y="494" font-size="10" fill="#333">Ground (Black)</text>
  <line x1="610" y1="508" x2="640" y2="508" stroke="#555" stroke-width="3"/>
  <text x="645" y="512" font-size="10" fill="#333">Coax (Grey)</text>
  <line x1="610" y1="526" x2="640" y2="526" stroke="#cc6600" stroke-width="2.5"/>
  <text x="645" y="530" font-size="10" fill="#333">Speaker (Orange)</text>
  <line x1="610" y1="544" x2="640" y2="544" stroke="#660099" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="645" y="548" font-size="10" fill="#333">Optional (Purple dash)</text>
</svg>
