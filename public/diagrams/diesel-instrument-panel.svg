<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" style="background:#fff;font-family:Arial,sans-serif;">
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Diesel Engine Instrument Panel Wiring</text>

  <!-- Instrument Panel -->
  <rect x="300" y="60" width="300" height="220" rx="8" fill="#1a1a2e" stroke="#333" stroke-width="3"/>
  <text x="450" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">INSTRUMENT PANEL</text>

  <!-- Oil Pressure Gauge -->
  <rect x="320" y="95" width="70" height="60" rx="5" fill="#2a2a3e" stroke="#666" stroke-width="1"/>
  <text x="355" y="112" text-anchor="middle" font-size="9" fill="#cccc00">OIL</text>
  <text x="355" y="124" text-anchor="middle" font-size="9" fill="#cccc00">PRESS</text>
  <text x="355" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#00ff00">45</text>
  <text x="355" y="152" text-anchor="middle" font-size="8" fill="#888">PSI</text>

  <!-- Temp Gauge -->
  <rect x="415" y="95" width="70" height="60" rx="5" fill="#2a2a3e" stroke="#666" stroke-width="1"/>
  <text x="450" y="112" text-anchor="middle" font-size="9" fill="#cccc00">COOLANT</text>
  <text x="450" y="124" text-anchor="middle" font-size="9" fill="#cccc00">TEMP</text>
  <text x="450" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#00ff00">180</text>
  <text x="450" y="152" text-anchor="middle" font-size="8" fill="#888">°F</text>

  <!-- Tachometer -->
  <rect x="510" y="95" width="70" height="60" rx="5" fill="#2a2a3e" stroke="#666" stroke-width="1"/>
  <text x="545" y="112" text-anchor="middle" font-size="9" fill="#cccc00">ENGINE</text>
  <text x="545" y="124" text-anchor="middle" font-size="9" fill="#cccc00">RPM</text>
  <text x="545" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#00ff00">2400</text>
  <text x="545" y="152" text-anchor="middle" font-size="8" fill="#888">RPM</text>

  <!-- Voltmeter -->
  <rect x="320" y="165" width="70" height="60" rx="5" fill="#2a2a3e" stroke="#666" stroke-width="1"/>
  <text x="355" y="182" text-anchor="middle" font-size="9" fill="#cccc00">BATTERY</text>
  <text x="355" y="194" text-anchor="middle" font-size="9" fill="#cccc00">VOLTS</text>
  <text x="355" y="210" text-anchor="middle" font-size="14" font-weight="bold" fill="#00ff00">13.8</text>
  <text x="355" y="222" text-anchor="middle" font-size="8" fill="#888">V</text>

  <!-- Alt light -->
  <rect x="415" y="165" width="70" height="60" rx="5" fill="#2a2a3e" stroke="#666" stroke-width="1"/>
  <text x="450" y="182" text-anchor="middle" font-size="9" fill="#cccc00">ALT</text>
  <text x="450" y="194" text-anchor="middle" font-size="9" fill="#cccc00">CHARGE</text>
  <circle cx="450" cy="212" r="10" fill="#ff6600" stroke="#fff" stroke-width="1"/>
  <text x="450" y="216" text-anchor="middle" font-size="8" fill="#fff">⚡</text>

  <!-- Alarm buzzer -->
  <rect x="510" y="165" width="70" height="60" rx="5" fill="#2a2a3e" stroke="#666" stroke-width="1"/>
  <text x="545" y="182" text-anchor="middle" font-size="9" fill="#cccc00">ALARM</text>
  <text x="545" y="194" text-anchor="middle" font-size="9" fill="#cccc00">BUZZER</text>
  <circle cx="545" cy="212" r="10" fill="#cc0000" stroke="#fff" stroke-width="1"/>
  <text x="545" y="216" text-anchor="middle" font-size="8" fill="#fff">!</text>

  <!-- Panel power connector -->
  <text x="450" y="265" text-anchor="middle" font-size="10" fill="#fff">PWR+ ─── GND ─── KEY</text>
  <circle cx="355" cy="280" r="4" fill="#cc0000"/>
  <circle cx="450" cy="280" r="4" fill="#000"/>
  <circle cx="545" cy="280" r="4" fill="#660099"/>

  <!-- Power wire to panel -->
  <line x1="355" y1="280" x2="355" y2="320" stroke="#cc0000" stroke-width="2"/>
  <line x1="355" y1="320" x2="200" y2="320" stroke="#cc0000" stroke-width="2"/>
  <line x1="200" y1="320" x2="200" y2="130" stroke="#cc0000" stroke-width="2"/>
  <rect x="170" y="120" width="30" height="20" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="185" y="134" text-anchor="middle" font-size="8" fill="#555">5A</text>
  <line x1="170" y1="130" x2="100" y2="130" stroke="#cc0000" stroke-width="2"/>
  <text x="235" y="310" font-size="9" fill="#cc0000">+12V (Red)</text>

  <!-- Ignition/Key wire -->
  <line x1="545" y1="280" x2="545" y2="320" stroke="#660099" stroke-width="2"/>
  <line x1="545" y1="320" x2="700" y2="320" stroke="#660099" stroke-width="2"/>
  <line x1="700" y1="320" x2="700" y2="130" stroke="#660099" stroke-width="2"/>
  <text x="620" y="312" font-size="9" fill="#660099">Key-on sense (Purple)</text>

  <!-- Battery / power source -->
  <rect x="30" y="90" width="70" height="55" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="65" y="113" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">BATT /</text>
  <text x="65" y="127" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">PANEL</text>
  <text x="65" y="140" text-anchor="middle" font-size="8" fill="#555">12V DC</text>
  <line x1="100" y1="118" x2="170" y2="118" stroke="#cc0000" stroke-width="2"/>

  <!-- Oil Pressure Sender -->
  <rect x="30" y="330" width="130" height="55" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">OIL PRESSURE</text>
  <text x="95" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">SENDER</text>
  <text x="95" y="378" text-anchor="middle" font-size="8" fill="#555">Variable resistance 0–250Ω</text>
  <!-- signal wire to oil gauge -->
  <line x1="160" y1="352" x2="250" y2="352" stroke="#cc6600" stroke-width="1.5"/>
  <line x1="250" y1="352" x2="250" y2="130" stroke="#cc6600" stroke-width="1.5"/>
  <line x1="250" y1="130" x2="355" y2="130" stroke="#cc6600" stroke-width="1.5"/>
  <line x1="355" y1="130" x2="355" y2="95" stroke="#cc6600" stroke-width="1.5"/>
  <text x="220" y="345" font-size="8" fill="#cc6600">S wire</text>

  <!-- Coolant Temp Sender -->
  <rect x="30" y="400" width="130" height="55" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">COOLANT TEMP</text>
  <text x="95" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">SENDER</text>
  <text x="95" y="448" text-anchor="middle" font-size="8" fill="#555">NTC thermistor</text>
  <!-- signal wire to temp gauge -->
  <line x1="160" y1="420" x2="280" y2="420" stroke="#0000cc" stroke-width="1.5"/>
  <line x1="280" y1="420" x2="280" y2="110" stroke="#0000cc" stroke-width="1.5"/>
  <line x1="280" y1="110" x2="450" y2="110" stroke="#0000cc" stroke-width="1.5"/>
  <line x1="450" y1="110" x2="450" y2="95" stroke="#0000cc" stroke-width="1.5"/>
  <text x="218" y="413" font-size="8" fill="#0000cc">S wire</text>

  <!-- Tach signal (W terminal from alternator) -->
  <rect x="730" y="330" width="130" height="55" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="795" y="350" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">ALTERNATOR</text>
  <text x="795" y="365" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">W TERMINAL</text>
  <text x="795" y="378" text-anchor="middle" font-size="8" fill="#555">AC pulse signal</text>
  <!-- tach wire -->
  <line x1="730" y1="352" x2="660" y2="352" stroke="#ccaa00" stroke-width="1.5"/>
  <line x1="660" y1="352" x2="660" y2="120" stroke="#ccaa00" stroke-width="1.5"/>
  <line x1="660" y1="120" x2="545" y2="120" stroke="#ccaa00" stroke-width="1.5"/>
  <line x1="545" y1="120" x2="545" y2="95" stroke="#ccaa00" stroke-width="1.5"/>
  <text x="690" y="345" font-size="8" fill="#ccaa00">Tach signal</text>

  <!-- Alternator charge light wire -->
  <rect x="730" y="400" width="130" height="55" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="795" y="420" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">ALTERNATOR</text>
  <text x="795" y="435" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">L / D+ TERM</text>
  <text x="795" y="448" text-anchor="middle" font-size="8" fill="#555">Charge warning</text>
  <!-- charge light wire -->
  <line x1="730" y1="422" x2="640" y2="422" stroke="#ff6600" stroke-width="1.5"/>
  <line x1="640" y1="422" x2="640" y2="180" stroke="#ff6600" stroke-width="1.5"/>
  <line x1="640" y1="180" x2="485" y2="180" stroke="#ff6600" stroke-width="1.5"/>
  <text x="680" y="415" font-size="8" fill="#ff6600">Charge light</text>

  <!-- Ground returns from senders/panel -->
  <line x1="450" y1="280" x2="450" y2="470" stroke="#000" stroke-width="2"/>
  <line x1="95" y1="385" x2="95" y2="470" stroke="#000" stroke-width="2"/>
  <line x1="95" y1="455" x2="795" y2="455" stroke="#000" stroke-width="2"/>
  <circle cx="450" cy="455" r="4" fill="#333"/>
  <line x1="95" y1="455" x2="95" y2="480" stroke="#000" stroke-width="2"/>
  <text x="420" y="500" text-anchor="middle" font-size="9" fill="#888">All ground returns to engine block / battery negative</text>

  <!-- Ground symbol -->
  <line x1="95" y1="480" x2="95" y2="510" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="510" x2="112" y2="510" stroke="#000" stroke-width="2.5"/>
  <line x1="83" y1="518" x2="107" y2="518" stroke="#000" stroke-width="2"/>
  <line x1="88" y1="526" x2="102" y2="526" stroke="#000" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="540" y="460" width="330" height="110" rx="5" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="705" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Sender Signal Wire Colors</text>
  <line x1="550" y1="492" x2="575" y2="492" stroke="#cc6600" stroke-width="2"/>
  <text x="580" y="496" font-size="10" fill="#333">Oil pressure signal (Orange)</text>
  <line x1="550" y1="510" x2="575" y2="510" stroke="#0000cc" stroke-width="2"/>
  <text x="580" y="514" font-size="10" fill="#333">Coolant temp signal (Blue)</text>
  <line x1="550" y1="528" x2="575" y2="528" stroke="#ccaa00" stroke-width="2"/>
  <text x="580" y="532" font-size="10" fill="#333">Tach / W terminal (Yellow)</text>
  <line x1="550" y1="546" x2="575" y2="546" stroke="#ff6600" stroke-width="2"/>
  <text x="580" y="550" font-size="10" fill="#333">Charge light / L term (Orange)</text>
</svg>
