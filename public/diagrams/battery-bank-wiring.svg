<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" style="background:#fff;font-family:Arial,sans-serif;">
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Dual Battery Bank Wiring</text>

  <!-- Battery 1 (Start) -->
  <rect x="40" y="140" width="100" height="60" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY 1</text>
  <text x="90" y="177" text-anchor="middle" font-size="10" fill="#555">Start / Crank</text>
  <text x="90" y="191" text-anchor="middle" font-size="9" fill="#888">12V 600CCA</text>
  <!-- battery terminals -->
  <circle cx="50" cy="140" r="5" fill="#cc0000"/>
  <text x="44" y="132" font-size="12" fill="#cc0000" font-weight="bold">+</text>
  <circle cx="130" cy="140" r="5" fill="#111"/>
  <text x="126" y="132" font-size="12" fill="#111" font-weight="bold">−</text>

  <!-- Battery 2 (House) -->
  <rect x="40" y="330" width="100" height="60" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="353" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY 2</text>
  <text x="90" y="367" text-anchor="middle" font-size="10" fill="#555">House / Deep Cycle</text>
  <text x="90" y="381" text-anchor="middle" font-size="9" fill="#888">12V 100Ah AGM</text>
  <circle cx="50" cy="330" r="5" fill="#cc0000"/>
  <text x="44" y="322" font-size="12" fill="#cc0000" font-weight="bold">+</text>
  <circle cx="130" cy="330" r="5" fill="#111"/>
  <text x="126" y="322" font-size="12" fill="#111" font-weight="bold">−</text>

  <!-- Wires to Battery Switch -->
  <!-- Bat 1 + -->
  <line x1="50" y1="140" x2="50" y2="110" stroke="#cc0000" stroke-width="2.5"/>
  <line x1="50" y1="110" x2="340" y2="110" stroke="#cc0000" stroke-width="2.5"/>
  <line x1="340" y1="110" x2="340" y2="210" stroke="#cc0000" stroke-width="2.5"/>
  <text x="180" y="102" text-anchor="middle" font-size="9" fill="#888">4 AWG RED</text>

  <!-- Bat 2 + -->
  <line x1="50" y1="330" x2="50" y2="460" stroke="#cc0000" stroke-width="2.5"/>
  <line x1="50" y1="460" x2="340" y2="460" stroke="#cc0000" stroke-width="2.5"/>
  <line x1="340" y1="460" x2="340" y2="350" stroke="#cc0000" stroke-width="2.5"/>
  <text x="180" y="475" text-anchor="middle" font-size="9" fill="#888">4 AWG RED</text>

  <!-- Battery Switch -->
  <rect x="290" y="210" width="100" height="140" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="340" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY</text>
  <text x="340" y="247" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">SWITCH</text>
  <text x="340" y="272" text-anchor="middle" font-size="10" fill="#555">1</text>
  <text x="340" y="290" text-anchor="middle" font-size="10" fill="#555">2</text>
  <text x="340" y="308" text-anchor="middle" font-size="10" fill="#555">BOTH</text>
  <text x="340" y="326" text-anchor="middle" font-size="10" fill="#cc0000">OFF</text>
  <!-- dividers -->
  <line x1="300" y1="260" x2="390" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="300" y1="278" x2="390" y2="278" stroke="#ccc" stroke-width="1"/>
  <line x1="300" y1="296" x2="390" y2="296" stroke="#ccc" stroke-width="1"/>
  <line x1="300" y1="314" x2="390" y2="314" stroke="#ccc" stroke-width="1"/>

  <!-- Wire: Switch to Alternator Isolator / Load -->
  <line x1="390" y1="280" x2="520" y2="280" stroke="#cc0000" stroke-width="2.5"/>
  <text x="450" y="270" text-anchor="middle" font-size="9" fill="#888">4 AWG</text>

  <!-- Alternator Isolator -->
  <rect x="520" y="240" width="120" height="80" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="580" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ALTERNATOR</text>
  <text x="580" y="283" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ISOLATOR</text>
  <text x="580" y="298" text-anchor="middle" font-size="9" fill="#555">(Diode / ACR)</text>

  <!-- Alternator -->
  <rect x="520" y="130" width="120" height="60" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="580" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ALTERNATOR</text>
  <text x="580" y="170" text-anchor="middle" font-size="9" fill="#555">70A Output</text>
  <!-- charging wire from alternator -->
  <line x1="580" y1="190" x2="580" y2="240" stroke="#ccaa00" stroke-width="2.5"/>
  <text x="590" y="220" font-size="9" fill="#888">4 AWG YEL</text>

  <!-- Isolator to Battery 1 -->
  <line x1="640" y1="265" x2="720" y2="265" stroke="#ccaa00" stroke-width="2"/>
  <line x1="720" y1="265" x2="720" y2="160" stroke="#ccaa00" stroke-width="2"/>
  <line x1="720" y1="160" x2="780" y2="160" stroke="#ccaa00" stroke-width="2"/>
  <rect x="780" y="140" width="80" height="40" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="820" y="158" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">BAT 1</text>
  <text x="820" y="172" text-anchor="middle" font-size="9" fill="#555">Start</text>

  <!-- Isolator to Battery 2 -->
  <line x1="640" y1="295" x2="720" y2="295" stroke="#ccaa00" stroke-width="2"/>
  <line x1="720" y1="295" x2="720" y2="380" stroke="#ccaa00" stroke-width="2"/>
  <line x1="720" y1="380" x2="780" y2="380" stroke="#ccaa00" stroke-width="2"/>
  <rect x="780" y="360" width="80" height="40" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="820" y="378" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">BAT 2</text>
  <text x="820" y="392" text-anchor="middle" font-size="9" fill="#555">House</text>

  <!-- Common Ground Bus -->
  <rect x="290" y="490" width="140" height="40" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="360" y="507" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">COMMON</text>
  <text x="360" y="521" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">GROUND BUS</text>
  <!-- Bat 1 negative to ground bus -->
  <line x1="130" y1="140" x2="200" y2="140" stroke="#000" stroke-width="2.5"/>
  <line x1="200" y1="140" x2="200" y2="510" stroke="#000" stroke-width="2.5"/>
  <line x1="200" y1="510" x2="290" y2="510" stroke="#000" stroke-width="2.5"/>
  <!-- Bat 2 negative to ground bus -->
  <line x1="130" y1="330" x2="160" y2="330" stroke="#000" stroke-width="2.5"/>
  <line x1="160" y1="330" x2="160" y2="510" stroke="#000" stroke-width="2"/>
  <circle cx="200" cy="510" r="4" fill="#333"/>
  <line x1="160" y1="510" x2="200" y2="510" stroke="#000" stroke-width="2"/>

  <!-- Ground symbol -->
  <line x1="360" y1="530" x2="360" y2="555" stroke="#000" stroke-width="2"/>
  <line x1="342" y1="555" x2="378" y2="555" stroke="#000" stroke-width="2.5"/>
  <line x1="347" y1="562" x2="373" y2="562" stroke="#000" stroke-width="2"/>
  <line x1="352" y1="569" x2="368" y2="569" stroke="#000" stroke-width="1.5"/>

  <!-- Legend -->
  <rect x="700" y="430" width="180" height="120" rx="5" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="790" y="448" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Wire Colors</text>
  <line x1="710" y1="462" x2="740" y2="462" stroke="#cc0000" stroke-width="2.5"/>
  <text x="745" y="466" font-size="10" fill="#333">Positive (Red)</text>
  <line x1="710" y1="480" x2="740" y2="480" stroke="#000" stroke-width="2.5"/>
  <text x="745" y="484" font-size="10" fill="#333">Ground (Black)</text>
  <line x1="710" y1="498" x2="740" y2="498" stroke="#ccaa00" stroke-width="2.5"/>
  <text x="745" y="502" font-size="10" fill="#333">Charging (Yellow)</text>
  <text x="790" y="528" text-anchor="middle" font-size="9" fill="#888">ACR = Auto Combining Relay</text>
</svg>
