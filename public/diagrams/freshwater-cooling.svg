<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a6faf"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d7a3a"/>
    </marker>
    <marker id="arrowBu" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a3aad"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f8f8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="55" fill="#1a3a5c"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">FRESHWATER COOLING SYSTEM</text>
  <text x="400" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0c4e8">Closed Cooling / Heat Exchanger System — Dual Loop Circuit</text>

  <!-- LOOP LABELS -->
  <text x="230" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2d7a3a">COOLANT LOOP (CLOSED)</text>
  <line x1="100" y1="84" x2="355" y2="84" stroke="#2d7a3a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a6faf">RAW WATER LOOP (OPEN)</text>
  <line x1="460" y1="84" x2="740" y2="84" stroke="#1a6faf" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- =========== COOLANT LOOP (LEFT SIDE) =========== -->

  <!-- COOLANT PUMP -->
  <rect x="45" y="115" width="110" height="60" rx="6" fill="#d4f0dc" stroke="#2d7a3a" stroke-width="2"/>
  <text x="100" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a3a1c">COOLANT PUMP</text>
  <text x="100" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Belt-Driven</text>
  <text x="100" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Circulates Antifreeze</text>
  <!-- pump symbol circle -->
  <circle cx="100" cy="140" r="7" fill="none" stroke="#2d7a3a" stroke-width="1.5"/>

  <!-- Coolant pump → engine block (right) -->
  <line x1="155" y1="145" x2="200" y2="145" stroke="#2d7a3a" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <!-- ENGINE BLOCK -->
  <rect x="200" y="100" width="130" height="95" rx="6" fill="#d4f0dc" stroke="#2d7a3a" stroke-width="2.5"/>
  <text x="265" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a3a1c">ENGINE BLOCK</text>
  <text x="265" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Water Jacket</text>
  <text x="265" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Combustion Heat</text>
  <text x="265" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Absorbed by Coolant</text>
  <text x="265" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-style="italic" fill="#888">Thermostat at outlet</text>
  <!-- engine block detail lines -->
  <line x1="210" y1="130" x2="320" y2="130" stroke="#2d7a3a" stroke-width="1" opacity="0.4"/>
  <line x1="210" y1="150" x2="320" y2="150" stroke="#2d7a3a" stroke-width="1" opacity="0.4"/>
  <line x1="210" y1="170" x2="320" y2="170" stroke="#2d7a3a" stroke-width="1" opacity="0.4"/>

  <!-- Engine block → thermostat (right) -->
  <line x1="330" y1="145" x2="375" y2="145" stroke="#2d7a3a" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="352" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2d7a3a">HOT</text>

  <!-- THERMOSTAT -->
  <rect x="375" y="120" width="100" height="52" rx="6" fill="#d4f0dc" stroke="#2d7a3a" stroke-width="2"/>
  <text x="425" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a3a1c">THERMOSTAT</text>
  <text x="425" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Opens at ~160–180°F</text>
  <text x="425" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Controls temp range</text>

  <!-- Thermostat → heat exchanger coolant side (right) -->
  <line x1="475" y1="146" x2="518" y2="175" stroke="#2d7a3a" stroke-width="2.5" marker-end="url(#arrowG)"/>

  <!-- BYPASS LINE (thermostat to coolant pump bypass) -->
  <line x1="425" y1="120" x2="425" y2="100" stroke="#2d7a3a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="425" y1="100" x2="100" y2="100" stroke="#2d7a3a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="100" y1="100" x2="100" y2="115" stroke="#2d7a3a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowG)"/>
  <text x="262" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d7a3a" font-style="italic">bypass (cold start — thermostat closed)</text>

  <!-- =========== HEAT EXCHANGER (CENTER) =========== -->
  <rect x="518" y="160" width="160" height="130" rx="8" fill="#e0eefc" stroke="#1a3a5c" stroke-width="2.5"/>
  <text x="598" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1a3a5c">HEAT EXCHANGER</text>
  <!-- Coolant side label -->
  <rect x="528" y="192" width="62" height="40" rx="4" fill="#d4f0dc" stroke="#2d7a3a" stroke-width="1.5"/>
  <text x="559" y="209" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2d7a3a">COOLANT</text>
  <text x="559" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d7a3a">SIDE</text>
  <!-- arrows inside heat exchanger showing heat transfer -->
  <text x="605" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#888">⇄</text>
  <!-- Raw water side label -->
  <rect x="627" y="192" width="62" height="40" rx="4" fill="#e8f4f8" stroke="#1a6faf" stroke-width="1.5"/>
  <text x="658" y="209" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a6faf">RAW</text>
  <text x="658" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1a6faf">WATER</text>
  <!-- heat transfer label -->
  <text x="598" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Heat Transfer:</text>
  <text x="598" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#666">Coolant → Raw Water</text>
  <text x="598" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Core tubes/plates</text>

  <!-- Heat exchanger coolant side → back to coolant pump (return) -->
  <line x1="518" y1="225" x2="490" y2="225" stroke="#2d7a3a" stroke-width="2.5"/>
  <line x1="490" y1="225" x2="490" y2="310" stroke="#2d7a3a" stroke-width="2.5"/>
  <line x1="490" y1="310" x2="100" y2="310" stroke="#2d7a3a" stroke-width="2.5"/>
  <line x1="100" y1="310" x2="100" y2="175" stroke="#2d7a3a" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="295" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2d7a3a">COOLED COOLANT RETURN TO PUMP</text>

  <!-- EXPANSION TANK -->
  <rect x="518" y="310" width="110" height="55" rx="6" fill="#d4f0dc" stroke="#2d7a3a" stroke-width="2"/>
  <text x="573" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a3a1c">EXPANSION</text>
  <text x="573" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a3a1c">TANK</text>
  <text x="573" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Overflow/Fill Point</text>
  <!-- cap symbol -->
  <rect x="561" y="299" width="24" height="12" rx="3" fill="#2d7a3a" opacity="0.5"/>
  <text x="573" y="309" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">CAP</text>
  <!-- connection from return line to expansion tank -->
  <line x1="573" y1="310" x2="573" y2="365" stroke="#2d7a3a" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- =========== RAW WATER LOOP (RIGHT SIDE) =========== -->

  <!-- Raw water enters heat exchanger from top -->
  <line x1="658" y1="135" x2="658" y2="192" stroke="#1a6faf" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <text x="675" y="168" font-family="Arial, sans-serif" font-size="9" fill="#1a6faf">RAW IN</text>
  <!-- label above -->
  <rect x="625" y="100" width="90" height="35" rx="5" fill="#e8f4f8" stroke="#1a6faf" stroke-width="1.5"/>
  <text x="670" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a3a5c">FROM RAW</text>
  <text x="670" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">WATER PUMP</text>

  <!-- Raw water exits heat exchanger bottom → overboard -->
  <line x1="658" y1="290" x2="658" y2="330" stroke="#1a6faf" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <text x="675" y="320" font-family="Arial, sans-serif" font-size="9" fill="#1a6faf">RAW OUT</text>
  <rect x="630" y="328" width="85" height="35" rx="5" fill="#e8f4f8" stroke="#1a6faf" stroke-width="1.5"/>
  <text x="672" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a3a5c">TO EXHAUST</text>
  <text x="672" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">OVERBOARD</text>

  <!-- LEGEND -->
  <rect x="20" y="370" width="200" height="110" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="120" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">LEGEND</text>
  <line x1="32" y1="405" x2="68" y2="405" stroke="#2d7a3a" stroke-width="2.5" marker-end="url(#arrowG)"/>
  <text x="75" y="408" font-family="Arial, sans-serif" font-size="9" fill="#333">Coolant Flow (Antifreeze)</text>
  <line x1="32" y1="422" x2="68" y2="422" stroke="#1a6faf" stroke-width="2.5" marker-end="url(#arrowB)"/>
  <text x="75" y="425" font-family="Arial, sans-serif" font-size="9" fill="#333">Raw Water Flow</text>
  <line x1="32" y1="438" x2="68" y2="438" stroke="#2d7a3a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="75" y="441" font-family="Arial, sans-serif" font-size="9" fill="#333">Bypass Line</text>
  <text x="32" y="460" font-family="Arial, sans-serif" font-size="8" fill="#d4110a">⚠ Use only marine-grade antifreeze/coolant</text>
  <text x="32" y="473" font-family="Arial, sans-serif" font-size="8" fill="#d4110a">⚠ Check coolant level at expansion tank</text>

  <!-- Temp gauge note -->
  <rect x="230" y="370" width="130" height="55" rx="5" fill="#fff9e6" stroke="#d4820a" stroke-width="1.5"/>
  <text x="295" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8B5E00">OPERATING TEMP</text>
  <text x="295" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Normal: 160–185°F</text>
  <text x="295" y="419" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d4110a">Alarm: &gt;200°F → SHUT DOWN</text>
</svg>
