<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" style="background:#fff;font-family:Arial,sans-serif;">
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Diesel Engine Start Circuit</text>

  <!-- Battery -->
  <rect x="30" y="200" width="110" height="80" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="85" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">START</text>
  <text x="85" y="243" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY</text>
  <text x="85" y="258" text-anchor="middle" font-size="9" fill="#555">12V 800+ CCA</text>
  <!-- battery symbol -->
  <line x1="45" y1="268" x2="75" y2="268" stroke="#333" stroke-width="3"/>
  <line x1="49" y1="275" x2="71" y2="275" stroke="#333" stroke-width="1.5"/>
  <text x="33" y="218" font-size="12" fill="#cc0000" font-weight="bold">+</text>
  <text x="33" y="278" font-size="12" fill="#000" font-weight="bold">−</text>

  <!-- Heavy cable to starter solenoid (bypass key switch) -->
  <line x1="85" y1="200" x2="85" y2="130" stroke="#cc0000" stroke-width="4"/>
  <line x1="85" y1="130" x2="640" y2="130" stroke="#cc0000" stroke-width="4"/>
  <line x1="640" y1="130" x2="640" y2="270" stroke="#cc0000" stroke-width="4"/>
  <text x="360" y="120" text-anchor="middle" font-size="9" fill="#888">2/0 AWG RED — Heavy start cable to solenoid B+</text>

  <!-- Key / Ignition Switch -->
  <rect x="200" y="200" width="130" height="180" rx="6" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <text x="265" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">KEY SWITCH</text>
  <rect x="215" y="230" width="100" height="26" rx="3" fill="#fff" stroke="#aaa" stroke-width="1"/>
  <text x="265" y="248" text-anchor="middle" font-size="10" fill="#666">STOP/OFF</text>
  <rect x="215" y="260" width="100" height="26" rx="3" fill="#fff8e0" stroke="#ccaa00" stroke-width="1.5"/>
  <text x="265" y="278" text-anchor="middle" font-size="10" fill="#665500">PREHEAT / WAIT</text>
  <rect x="215" y="290" width="100" height="26" rx="3" fill="#ffe0e0" stroke="#cc0000" stroke-width="1.5"/>
  <text x="265" y="308" text-anchor="middle" font-size="10" fill="#cc0000">RUN / ON</text>
  <rect x="215" y="320" width="100" height="26" rx="3" fill="#e0ffe0" stroke="#006600" stroke-width="1.5"/>
  <text x="265" y="338" text-anchor="middle" font-size="10" fill="#006600">START (crank)</text>
  <!-- terminal labels -->
  <text x="205" y="246" font-size="8" fill="#888">B</text>
  <text x="205" y="276" font-size="8" fill="#888">H</text>
  <text x="205" y="306" font-size="8" fill="#888">M</text>
  <text x="205" y="336" font-size="8" fill="#888">S</text>
  <circle cx="200" cy="243" r="3" fill="#cc0000"/>
  <circle cx="200" cy="273" r="3" fill="#ccaa00"/>
  <circle cx="200" cy="303" r="3" fill="#660099"/>
  <circle cx="200" cy="333" r="3" fill="#006600"/>
  <circle cx="330" cy="303" r="3" fill="#660099"/>
  <circle cx="330" cy="333" r="3" fill="#006600"/>

  <!-- Battery + to key switch B -->
  <line x1="85" y1="160" x2="165" y2="160" stroke="#cc0000" stroke-width="2.5"/>
  <line x1="165" y1="160" x2="165" y2="243" stroke="#cc0000" stroke-width="2.5"/>
  <line x1="165" y1="243" x2="200" y2="243" stroke="#cc0000" stroke-width="2.5"/>
  <circle cx="85" cy="160" r="4" fill="#333"/>
  <text x="125" y="152" font-size="9" fill="#888">10 AWG</text>

  <!-- Glow Plug / Preheat Relay -->
  <rect x="420" y="160" width="140" height="75" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="490" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">GLOW PLUG</text>
  <text x="490" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">RELAY</text>
  <text x="490" y="213" text-anchor="middle" font-size="9" fill="#555">Timer relay ~6–8s</text>
  <text x="490" y="226" text-anchor="middle" font-size="9" fill="#888">80–150A contact</text>
  <!-- terminal dots -->
  <circle cx="420" cy="195" r="4" fill="#ccaa00"/>
  <circle cx="560" cy="195" r="4" fill="#ccaa00"/>

  <!-- H wire from key to glow relay coil -->
  <line x1="200" y1="273" x2="160" y2="273" stroke="#ccaa00" stroke-width="2"/>
  <line x1="160" y1="273" x2="160" y2="195" stroke="#ccaa00" stroke-width="2"/>
  <line x1="160" y1="195" x2="420" y2="195" stroke="#ccaa00" stroke-width="2"/>
  <text x="290" y="183" font-size="9" fill="#ccaa00">Yellow — Preheat/Glow</text>

  <!-- Glow plugs -->
  <rect x="680" y="140" width="140" height="115" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="750" y="162" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">GLOW PLUGS</text>
  <text x="750" y="177" text-anchor="middle" font-size="9" fill="#555">1 per cylinder</text>
  <!-- individual plugs -->
  <circle cx="710" cy="200" r="8" fill="#cc6600" stroke="#333" stroke-width="1"/>
  <text x="710" y="204" text-anchor="middle" font-size="7" fill="#fff">G1</text>
  <circle cx="740" cy="200" r="8" fill="#cc6600" stroke="#333" stroke-width="1"/>
  <text x="740" y="204" text-anchor="middle" font-size="7" fill="#fff">G2</text>
  <circle cx="770" cy="200" r="8" fill="#cc6600" stroke="#333" stroke-width="1"/>
  <text x="770" y="204" text-anchor="middle" font-size="7" fill="#fff">G3</text>
  <circle cx="800" cy="200" r="8" fill="#cc6600" stroke="#333" stroke-width="1"/>
  <text x="800" y="204" text-anchor="middle" font-size="7" fill="#fff">G4</text>
  <text x="750" y="222" text-anchor="middle" font-size="8" fill="#888">0.8–1.5Ω each</text>
  <text x="750" y="237" text-anchor="middle" font-size="8" fill="#555">Heat intake air</text>
  <text x="750" y="250" text-anchor="middle" font-size="8" fill="#888">for cold start</text>

  <!-- Relay output to glow plugs -->
  <line x1="560" y1="195" x2="640" y2="195" stroke="#ccaa00" stroke-width="2.5"/>
  <line x1="640" y1="195" x2="680" y2="195" stroke="#ccaa00" stroke-width="2.5"/>

  <!-- Starter Solenoid -->
  <rect x="560" y="270" width="140" height="75" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="630" y="293" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">STARTER</text>
  <text x="630" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">SOLENOID</text>
  <text x="630" y="323" text-anchor="middle" font-size="9" fill="#555">Magnetic switch</text>
  <text x="630" y="336" text-anchor="middle" font-size="9" fill="#888">Engages pinion</text>
  <circle cx="560" cy="290" r="4" fill="#006600"/>
  <circle cx="700" cy="290" r="4" fill="#cc0000"/>

  <!-- S wire from key to solenoid coil -->
  <line x1="330" y1="333" x2="490" y2="333" stroke="#006600" stroke-width="2"/>
  <line x1="490" y1="333" x2="490" y2="290" stroke="#006600" stroke-width="2"/>
  <line x1="490" y1="290" x2="560" y2="290" stroke="#006600" stroke-width="2"/>
  <text x="430" y="350" font-size="9" fill="#006600">Green — Crank signal</text>

  <!-- Heavy cable to solenoid -->
  <line x1="640" y1="130" x2="700" y2="130" stroke="#cc0000" stroke-width="4"/>
  <line x1="700" y1="130" x2="700" y2="270" stroke="#cc0000" stroke-width="4"/>

  <!-- Starter Motor -->
  <rect x="760" y="280" width="110" height="75" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="815" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">STARTER</text>
  <text x="815" y="323" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">MOTOR</text>
  <text x="815" y="338" text-anchor="middle" font-size="9" fill="#888">2–5 kW</text>
  <!-- solenoid to motor -->
  <line x1="700" y1="305" x2="760" y2="305" stroke="#cc0000" stroke-width="4"/>
  <text x="730" y="295" font-size="8" fill="#888">2/0</text>

  <!-- Engine ground return -->
  <line x1="815" y1="355" x2="815" y2="490" stroke="#000" stroke-width="3"/>
  <line x1="815" y1="490" x2="85" y2="490" stroke="#000" stroke-width="3"/>
  <line x1="85" y1="490" x2="85" y2="280" stroke="#000" stroke-width="3"/>
  <text x="450" y="505" text-anchor="middle" font-size="9" fill="#888">2/0 AWG BLK — Engine block ground → battery negative</text>

  <!-- Ground symbol -->
  <line x1="85" y1="490" x2="85" y2="520" stroke="#000" stroke-width="2"/>
  <line x1="68" y1="520" x2="102" y2="520" stroke="#000" stroke-width="2.5"/>
  <line x1="73" y1="528" x2="97" y2="528" stroke="#000" stroke-width="2"/>
  <line x1="78" y1="536" x2="92" y2="536" stroke="#000" stroke-width="1.5"/>

  <!-- M wire (run) from key to injection/fuel stop solenoid -->
  <line x1="330" y1="303" x2="400" y2="303" stroke="#660099" stroke-width="2"/>
  <rect x="400" y="290" width="120" height="30" rx="3" fill="#f0f0f0" stroke="#660099" stroke-width="1.5"/>
  <text x="460" y="302" text-anchor="middle" font-size="9" fill="#660099">FUEL STOP SOL</text>
  <text x="460" y="314" text-anchor="middle" font-size="9" fill="#888">Deenergize to stop</text>

  <!-- Legend -->
  <rect x="30" y="540" width="400" height="50" rx="5" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <line x1="40" y1="558" x2="65" y2="558" stroke="#cc0000" stroke-width="3"/>
  <text x="70" y="562" font-size="9" fill="#333">Heavy cable (Red)</text>
  <line x1="140" y1="558" x2="165" y2="558" stroke="#000" stroke-width="3"/>
  <text x="170" y="562" font-size="9" fill="#333">Heavy GND (Black)</text>
  <line x1="245" y1="558" x2="270" y2="558" stroke="#ccaa00" stroke-width="2"/>
  <text x="275" y="562" font-size="9" fill="#333">Preheat (Yellow)</text>
  <line x1="350" y1="558" x2="375" y2="558" stroke="#006600" stroke-width="2"/>
  <text x="380" y="562" font-size="9" fill="#333">Crank (Green)</text>
  <line x1="40" y1="578" x2="65" y2="578" stroke="#660099" stroke-width="2"/>
  <text x="70" y="582" font-size="9" fill="#333">Run/Ignition (Purple)</text>
</svg>
