<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" style="background:#fff;font-family:Arial,sans-serif;">
  <defs>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="4" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">DC Main Distribution Panel</text>

  <!-- Battery symbol -->
  <g transform="translate(60,160)">
    <rect x="-30" y="-22" width="60" height="44" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
    <text x="0" y="-28" text-anchor="middle" font-size="11" fill="#333" font-weight="bold">12V BATTERY</text>
    <!-- battery lines -->
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="#333" stroke-width="3"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#333" stroke-width="1.5"/>
    <line x1="-12" y1="8" x2="12" y2="8" stroke="#333" stroke-width="3"/>
    <line x1="-7" y1="16" x2="7" y2="16" stroke="#333" stroke-width="1.5"/>
    <text x="-18" y="-4" font-size="13" fill="#cc0000" font-weight="bold">+</text>
    <text x="12" y="20" font-size="13" fill="#000" font-weight="bold">−</text>
  </g>
  <!-- Positive lead label -->
  <text x="105" y="148" font-size="10" fill="#888">4 AWG</text>

  <!-- Wire: Battery + to Main Switch -->
  <line x1="90" y1="160" x2="220" y2="160" stroke="#cc0000" stroke-width="2.5"/>

  <!-- Main Switch -->
  <rect x="220" y="138" width="80" height="44" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="260" y="156" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">MAIN</text>
  <text x="260" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">SWITCH</text>
  <!-- switch arc -->
  <line x1="235" y1="160" x2="248" y2="160" stroke="#cc0000" stroke-width="2"/>
  <path d="M248,160 Q258,150 270,160" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="270" y1="160" x2="284" y2="160" stroke="#cc0000" stroke-width="2"/>

  <!-- Wire: Main Switch to Bus Bar -->
  <line x1="300" y1="160" x2="400" y2="160" stroke="#cc0000" stroke-width="2.5"/>
  <text x="342" y="148" font-size="10" fill="#888">4 AWG</text>

  <!-- Bus Bar -->
  <rect x="400" y="120" width="80" height="80" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="440" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BUS</text>
  <text x="440" y="170" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BAR</text>
  <!-- connection dots on bus bar right side -->
  <circle cx="480" cy="135" r="4" fill="#cc0000"/>
  <circle cx="480" cy="150" r="4" fill="#cc0000"/>
  <circle cx="480" cy="165" r="4" fill="#cc0000"/>
  <circle cx="480" cy="180" r="4" fill="#cc0000"/>
  <circle cx="480" cy="195" r="4" fill="#cc0000"/>

  <!-- Branch fuses + loads -->
  <!-- Branch 1: Nav Lights -->
  <line x1="480" y1="135" x2="540" y2="135" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="540" y="127" width="24" height="16" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="552" y="123" text-anchor="middle" font-size="9" fill="#555">5A</text>
  <line x1="564" y1="135" x2="620" y2="135" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="620" y="120" width="90" height="30" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="665" y="140" text-anchor="middle" font-size="11" fill="#333">Nav Lights</text>

  <!-- Branch 2: VHF Radio -->
  <line x1="480" y1="150" x2="540" y2="150" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="540" y="142" width="24" height="16" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="552" y="138" text-anchor="middle" font-size="9" fill="#555">5A</text>
  <line x1="564" y1="150" x2="620" y2="150" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="620" y="135" width="90" height="30" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="665" y="155" text-anchor="middle" font-size="11" fill="#333">VHF Radio</text>

  <!-- Branch 3: Bilge Pump -->
  <line x1="480" y1="165" x2="540" y2="165" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="540" y="157" width="24" height="16" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="552" y="153" text-anchor="middle" font-size="9" fill="#555">15A</text>
  <line x1="564" y1="165" x2="620" y2="165" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="620" y="150" width="90" height="30" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="665" y="170" text-anchor="middle" font-size="11" fill="#333">Bilge Pump</text>

  <!-- Branch 4: Instruments -->
  <line x1="480" y1="180" x2="540" y2="180" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="540" y="172" width="24" height="16" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="552" y="168" text-anchor="middle" font-size="9" fill="#555">5A</text>
  <line x1="564" y1="180" x2="620" y2="180" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="620" y="165" width="90" height="30" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="665" y="185" text-anchor="middle" font-size="11" fill="#333">Instruments</text>

  <!-- Branch 5: Accessories -->
  <line x1="480" y1="195" x2="540" y2="195" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="540" y="187" width="24" height="16" rx="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="552" y="183" text-anchor="middle" font-size="9" fill="#555">10A</text>
  <line x1="564" y1="195" x2="620" y2="195" stroke="#cc0000" stroke-width="1.5"/>
  <rect x="620" y="180" width="90" height="30" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="665" y="200" text-anchor="middle" font-size="11" fill="#333">Accessories</text>

  <!-- Ground bus bar -->
  <rect x="400" y="280" width="80" height="40" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="440" y="297" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">GROUND</text>
  <text x="440" y="311" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">BUS</text>

  <!-- Battery negative to ground bus -->
  <line x1="60" y1="182" x2="60" y2="300" stroke="#000" stroke-width="2.5"/>
  <line x1="60" y1="300" x2="400" y2="300" stroke="#000" stroke-width="2.5"/>
  <text x="100" y="318" font-size="10" fill="#888">4 AWG GND</text>

  <!-- Ground returns from loads -->
  <line x1="665" y1="210" x2="665" y2="300" stroke="#000" stroke-width="1.5"/>
  <line x1="665" y1="300" x2="480" y2="300" stroke="#000" stroke-width="1.5"/>
  <circle cx="480" cy="300" r="4" fill="#333"/>

  <!-- Ground symbol at battery -->
  <line x1="60" y1="300" x2="60" y2="330" stroke="#000" stroke-width="2"/>
  <line x1="44" y1="330" x2="76" y2="330" stroke="#000" stroke-width="2.5"/>
  <line x1="49" y1="338" x2="71" y2="338" stroke="#000" stroke-width="2"/>
  <line x1="54" y1="346" x2="66" y2="346" stroke="#000" stroke-width="1.5"/>

  <!-- Wire gauge note -->
  <text x="440" y="370" text-anchor="middle" font-size="11" fill="#555">All branch return wires to Ground Bus</text>

  <!-- Fuse note -->
  <text x="450" y="395" text-anchor="middle" font-size="10" fill="#777">Main fuse on battery + terminal (not shown): 60A–100A ANL</text>

  <!-- Color Legend -->
  <rect x="710" y="430" width="170" height="110" rx="5" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="795" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Wire Colors</text>
  <line x1="720" y1="460" x2="745" y2="460" stroke="#cc0000" stroke-width="2.5"/>
  <text x="750" y="464" font-size="10" fill="#333">Positive (Red)</text>
  <line x1="720" y1="478" x2="745" y2="478" stroke="#000" stroke-width="2.5"/>
  <text x="750" y="482" font-size="10" fill="#333">Ground (Black)</text>
  <line x1="720" y1="496" x2="745" y2="496" stroke="#ccaa00" stroke-width="2.5"/>
  <text x="750" y="500" font-size="10" fill="#333">Charging (Yellow)</text>
  <line x1="720" y1="514" x2="745" y2="514" stroke="#cc6600" stroke-width="2.5"/>
  <text x="750" y="518" font-size="10" fill="#333">Accessory (Orange)</text>

  <!-- Fuse symbol legend -->
  <rect x="50" y="430" width="200" height="60" rx="4" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="150" y="447" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Symbols</text>
  <line x1="60" y1="465" x2="80" y2="465" stroke="#333" stroke-width="1.5"/>
  <rect x="80" y="457" width="20" height="16" rx="2" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="465" x2="120" y2="465" stroke="#333" stroke-width="1.5"/>
  <text x="125" y="469" font-size="10" fill="#333">= Fuse</text>
  <line x1="60" y1="488" x2="76" y2="488" stroke="#000" stroke-width="2.5"/>
  <line x1="48" y1="488" x2="76" y2="488" stroke="#000" stroke-width="2.5"/>
  <line x1="53" y1="494" x2="71" y2="494" stroke="#000" stroke-width="2"/>
  <line x1="58" y1="500" x2="66" y2="500" stroke="#000" stroke-width="1.5"/>
  <text x="82" y="492" font-size="10" fill="#333">= Ground</text>
</svg>
