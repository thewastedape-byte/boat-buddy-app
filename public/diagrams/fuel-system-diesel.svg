<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4820a"/>
    </marker>
    <marker id="arrowOr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c04000"/>
    </marker>
    <marker id="arrowBk" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f8f8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="55" fill="#4a2800"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white">DIESEL FUEL SYSTEM</text>
  <text x="400" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f0c870">Marine Diesel Engine — Supply &amp; Return Circuit</text>

  <!-- Flow labels at top -->
  <text x="280" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d4820a">→ SUPPLY LINE (FEED)</text>
  <text x="580" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c04000">← RETURN LINE</text>

  <!-- ===== FUEL TANK ===== -->
  <rect x="20" y="160" width="95" height="130" rx="6" fill="#fff9e6" stroke="#d4820a" stroke-width="2.5"/>
  <text x="67" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a2800">FUEL</text>
  <text x="67" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a2800">TANK</text>
  <!-- fuel level indicator -->
  <rect x="35" y="210" width="60" height="55" rx="3" fill="#ffe090" stroke="#d4820a" stroke-width="1"/>
  <text x="65" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a2800">DIESEL</text>
  <!-- fuel level bar -->
  <rect x="40" y="228" width="50" height="30" rx="2" fill="#d4820a" opacity="0.3"/>
  <line x1="40" y1="245" x2="90" y2="245" stroke="#d4820a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="65" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#666">~75% level</text>
  <text x="67" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Vent required</text>

  <!-- Tank → shutoff valve -->
  <line x1="115" y1="225" x2="150" y2="225" stroke="#d4820a" stroke-width="3" marker-end="url(#arrowO)"/>

  <!-- FUEL SHUTOFF VALVE -->
  <rect x="150" y="205" width="80" height="45" rx="6" fill="#fff9e6" stroke="#d4820a" stroke-width="2"/>
  <text x="190" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a2800">FUEL</text>
  <text x="190" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a2800">SHUTOFF</text>
  <text x="190" y="249" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">Ball Valve</text>
  <!-- valve symbol (bow-tie) -->
  <path d="M178 215 L202 215 L190 223 Z" fill="#d4820a" opacity="0.5"/>
  <path d="M178 223 L202 223 L190 215 Z" fill="#d4820a" opacity="0.5"/>

  <!-- Shutoff → primary filter -->
  <line x1="230" y1="225" x2="268" y2="225" stroke="#d4820a" stroke-width="3" marker-end="url(#arrowO)"/>

  <!-- PRIMARY FILTER / WATER SEPARATOR -->
  <rect x="268" y="190" width="110" height="75" rx="6" fill="#fff9e6" stroke="#d4820a" stroke-width="2"/>
  <text x="323" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a2800">PRIMARY FILTER</text>
  <text x="323" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a2800">/ WATER SEP.</text>
  <text x="323" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Racor 500FG</text>
  <text x="323" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">10 micron</text>
  <text x="323" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d4110a">Drain bowl regularly</text>
  <!-- filter bowl symbol -->
  <ellipse cx="323" cy="203" rx="20" ry="8" fill="none" stroke="#d4820a" stroke-width="1.5"/>

  <!-- Primary filter → lift pump -->
  <line x1="378" y1="227" x2="415" y2="227" stroke="#d4820a" stroke-width="3" marker-end="url(#arrowO)"/>

  <!-- LIFT PUMP / FUEL PUMP -->
  <rect x="415" y="203" width="90" height="55" rx="6" fill="#fff9e6" stroke="#d4820a" stroke-width="2"/>
  <text x="460" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a2800">LIFT PUMP</text>
  <text x="460" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Low Pressure</text>
  <text x="460" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Diaphragm type</text>
  <!-- pump circle -->
  <circle cx="460" cy="225" r="8" fill="none" stroke="#d4820a" stroke-width="1.5"/>
  <text x="460" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d4820a">↻</text>

  <!-- Lift pump → secondary filter -->
  <line x1="505" y1="230" x2="542" y2="230" stroke="#d4820a" stroke-width="3" marker-end="url(#arrowO)"/>

  <!-- SECONDARY FILTER -->
  <rect x="542" y="208" width="95" height="52" rx="6" fill="#fff9e6" stroke="#d4820a" stroke-width="2"/>
  <text x="589" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a2800">SECONDARY</text>
  <text x="589" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a2800">FILTER</text>
  <text x="589" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2 micron</text>

  <!-- Secondary filter → injection pump -->
  <line x1="637" y1="234" x2="672" y2="234" stroke="#d4820a" stroke-width="3" marker-end="url(#arrowO)"/>

  <!-- INJECTION PUMP (HIGH PRESSURE) -->
  <rect x="672" y="195" width="108" height="80" rx="6" fill="#ffe0c0" stroke="#c04000" stroke-width="2.5"/>
  <text x="726" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a0000">INJECTION</text>
  <text x="726" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a0000">PUMP</text>
  <text x="726" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">High Pressure</text>
  <text x="726" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">3,000–20,000 PSI</text>
  <text x="726" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#d4110a">Cam-driven</text>

  <!-- Injection pump → injectors (down) -->
  <line x1="726" y1="275" x2="726" y2="310" stroke="#c04000" stroke-width="3" marker-end="url(#arrowOr)"/>
  <text x="740" y="298" font-family="Arial, sans-serif" font-size="9" fill="#c04000">Hi-P</text>

  <!-- INJECTORS -->
  <rect x="652" y="310" width="148" height="65" rx="6" fill="#ffe0c0" stroke="#c04000" stroke-width="2.5"/>
  <text x="726" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a0000">FUEL INJECTORS</text>
  <text x="726" y="347" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">One per cylinder</text>
  <text x="726" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">Atomize fuel → combustion</text>
  <text x="726" y="372" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#d4110a">Nozzle pop-pressure critical</text>
  <!-- injector spray symbols -->
  <path d="M680 370 L675 385 L685 385 Z" fill="#c04000" opacity="0.5"/>
  <path d="M726 370 L721 385 L731 385 Z" fill="#c04000" opacity="0.5"/>
  <path d="M772 370 L767 385 L777 385 Z" fill="#c04000" opacity="0.5"/>

  <!-- RETURN LINE (goes back to tank) -->
  <!-- From injectors left side, then down and back along bottom -->
  <line x1="652" y1="343" x2="620" y2="343" stroke="#c04000" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="620" y1="343" x2="620" y2="410" stroke="#c04000" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="620" y1="410" x2="67" y2="410" stroke="#c04000" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowOr)"/>
  <line x1="67" y1="410" x2="67" y2="290" stroke="#c04000" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowOr)"/>
  <text x="344" y="426" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c04000">FUEL RETURN LINE (excess fuel back to tank)</text>

  <!-- Also return from injection pump -->
  <line x1="672" y1="255" x2="644" y2="255" stroke="#c04000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="644" y1="255" x2="644" y2="343" stroke="#c04000" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="630" y="300" font-family="Arial, sans-serif" font-size="8" fill="#c04000" transform="rotate(-90,630,300)">OVERFLOW</text>

  <!-- BLEED POINTS annotation -->
  <text x="420" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#888" font-style="italic">Bleed here after filter change →</text>
  <path d="M415 170 L415 204" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- PRESSURE LABELS -->
  <text x="344" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555" font-style="italic">LOW PRESSURE SIDE (5–20 PSI)</text>
  <line x1="150" y1="175" x2="540" y2="175" stroke="#d4820a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="700" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c04000" font-style="italic">HIGH PRESSURE</text>

  <!-- LEGEND -->
  <rect x="20" y="85" width="200" height="80" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="120" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#333">LEGEND</text>
  <line x1="32" y1="116" x2="72" y2="116" stroke="#d4820a" stroke-width="3"/>
  <text x="78" y="119" font-family="Arial, sans-serif" font-size="9" fill="#333">Fuel Supply (Low Pressure)</text>
  <line x1="32" y1="132" x2="72" y2="132" stroke="#c04000" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="78" y="136" font-family="Arial, sans-serif" font-size="9" fill="#333">Fuel Return / High Pressure</text>
  <text x="32" y="155" font-family="Arial, sans-serif" font-size="8" fill="#d4110a">⚠ Diesel is flammable — no open flames near fuel system</text>
</svg>
