<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" style="background:#fff;font-family:Arial,sans-serif;">
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Alternator Charging Circuit</text>

  <!-- Engine block -->
  <rect x="40" y="200" width="120" height="100" rx="5" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <text x="100" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ENGINE</text>
  <text x="100" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BLOCK</text>

  <!-- Alternator -->
  <rect x="40" y="340" width="120" height="70" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="100" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ALTERNATOR</text>
  <text x="100" y="380" text-anchor="middle" font-size="10" fill="#555">14.2V / 70A</text>
  <text x="100" y="395" text-anchor="middle" font-size="9" fill="#888">Belt driven</text>
  <!-- terminal labels -->
  <text x="168" y="352" font-size="9" fill="#888">B+</text>
  <text x="168" y="375" font-size="9" fill="#888">S</text>
  <text x="168" y="398" font-size="9" fill="#888">F</text>
  <circle cx="160" cy="348" r="4" fill="#cc0000"/>
  <circle cx="160" cy="372" r="4" fill="#ccaa00"/>
  <circle cx="160" cy="395" r="4" fill="#660099"/>

  <!-- Voltage Regulator -->
  <rect x="230" y="340" width="120" height="70" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="290" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">VOLTAGE</text>
  <text x="290" y="380" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">REGULATOR</text>
  <text x="290" y="395" text-anchor="middle" font-size="9" fill="#555">Internal / External</text>

  <!-- Alt S wire to regulator -->
  <line x1="160" y1="372" x2="200" y2="372" stroke="#ccaa00" stroke-width="1.5"/>
  <line x1="200" y1="372" x2="230" y2="372" stroke="#ccaa00" stroke-width="1.5"/>
  <!-- Alt F wire to regulator -->
  <line x1="160" y1="395" x2="200" y2="395" stroke="#660099" stroke-width="1.5"/>
  <line x1="200" y1="395" x2="230" y2="395" stroke="#660099" stroke-width="1.5"/>

  <!-- Battery Isolator -->
  <rect x="440" y="220" width="130" height="80" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <text x="505" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY</text>
  <text x="505" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">ISOLATOR</text>
  <text x="505" y="278" text-anchor="middle" font-size="9" fill="#555">Diode or ACR</text>
  <text x="505" y="293" text-anchor="middle" font-size="9" fill="#888">Input ← A / B → Out</text>
  <!-- Isolator terminals -->
  <circle cx="440" cy="260" r="4" fill="#ccaa00"/>
  <text x="422" y="264" font-size="9" fill="#888">IN</text>
  <circle cx="570" cy="245" r="4" fill="#ccaa00"/>
  <text x="575" y="249" font-size="9" fill="#888">A</text>
  <circle cx="570" cy="275" r="4" fill="#ccaa00"/>
  <text x="575" y="279" font-size="9" fill="#888">B</text>

  <!-- Alt B+ wire up to isolator -->
  <line x1="160" y1="348" x2="320" y2="348" stroke="#ccaa00" stroke-width="2.5"/>
  <line x1="320" y1="348" x2="320" y2="260" stroke="#ccaa00" stroke-width="2.5"/>
  <line x1="320" y1="260" x2="440" y2="260" stroke="#ccaa00" stroke-width="2.5"/>
  <text x="370" y="270" font-size="9" fill="#888">4 AWG YEL</text>

  <!-- Start Battery -->
  <rect x="660" y="180" width="110" height="70" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="715" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">START</text>
  <text x="715" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY</text>
  <text x="715" y="235" text-anchor="middle" font-size="9" fill="#555">12V 600+ CCA</text>
  <!-- battery symbol lines -->
  <line x1="670" y1="240" x2="760" y2="240" stroke="#cc0000" stroke-width="1"/>
  <circle cx="660" cy="215" r="5" fill="#cc0000"/>

  <!-- House Battery -->
  <rect x="660" y="310" width="110" height="70" rx="5" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="715" y="335" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">HOUSE</text>
  <text x="715" y="350" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">BATTERY</text>
  <text x="715" y="365" text-anchor="middle" font-size="9" fill="#555">12V 100Ah AGM</text>
  <circle cx="660" cy="345" r="5" fill="#cc0000"/>

  <!-- Isolator A to Start Battery -->
  <line x1="570" y1="245" x2="630" y2="245" stroke="#ccaa00" stroke-width="2"/>
  <line x1="630" y1="245" x2="630" y2="215" stroke="#ccaa00" stroke-width="2"/>
  <line x1="630" y1="215" x2="660" y2="215" stroke="#ccaa00" stroke-width="2"/>
  <text x="610" y="232" font-size="9" fill="#888">2 AWG</text>

  <!-- Isolator B to House Battery -->
  <line x1="570" y1="275" x2="630" y2="275" stroke="#ccaa00" stroke-width="2"/>
  <line x1="630" y1="275" x2="630" y2="345" stroke="#ccaa00" stroke-width="2"/>
  <line x1="630" y1="345" x2="660" y2="345" stroke="#ccaa00" stroke-width="2"/>
  <text x="610" y="320" font-size="9" fill="#888">4 AWG</text>

  <!-- Ground connections -->
  <line x1="660" y1="250" x2="620" y2="250" stroke="#000" stroke-width="2"/>
  <line x1="660" y1="380" x2="620" y2="380" stroke="#000" stroke-width="2"/>
  <line x1="620" y1="250" x2="620" y2="490" stroke="#000" stroke-width="2"/>
  <line x1="620" y1="380" x2="620" y2="490" stroke="#000" stroke-width="2"/>
  <circle cx="620" cy="380" r="4" fill="#333"/>

  <!-- Engine block ground -->
  <line x1="100" y1="300" x2="100" y2="490" stroke="#000" stroke-width="2.5"/>
  <line x1="100" y1="490" x2="620" y2="490" stroke="#000" stroke-width="2.5"/>
  <circle cx="620" cy="490" r="4" fill="#333"/>
  <text x="350" y="485" text-anchor="middle" font-size="9" fill="#888">4 AWG BLK GROUND</text>

  <!-- Ground symbol -->
  <line x1="100" y1="490" x2="100" y2="520" stroke="#000" stroke-width="2"/>
  <line x1="82" y1="520" x2="118" y2="520" stroke="#000" stroke-width="2.5"/>
  <line x1="87" y1="528" x2="113" y2="528" stroke="#000" stroke-width="2"/>
  <line x1="92" y1="536" x2="108" y2="536" stroke="#000" stroke-width="1.5"/>
  <text x="100" y="552" text-anchor="middle" font-size="9" fill="#555">Chassis Ground</text>

  <!-- Charge indicator note -->
  <rect x="230" y="130" width="200" height="50" rx="4" fill="#fffbe6" stroke="#ccaa00" stroke-width="1"/>
  <text x="330" y="150" text-anchor="middle" font-size="10" fill="#665500">Regulator monitors battery voltage</text>
  <text x="330" y="165" text-anchor="middle" font-size="10" fill="#665500">and controls field current (F terminal)</text>

  <!-- Wire from regulator to ignition note -->
  <line x1="290" y1="340" x2="290" y2="180" stroke="#660099" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="298" y="200" font-size="9" fill="#660099">Ignition sense</text>

  <!-- Legend -->
  <rect x="700" y="440" width="185" height="130" rx="5" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>
  <text x="792" y="458" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Wire Colors</text>
  <line x1="710" y1="472" x2="740" y2="472" stroke="#cc0000" stroke-width="2.5"/>
  <text x="745" y="476" font-size="10" fill="#333">Positive (Red)</text>
  <line x1="710" y1="490" x2="740" y2="490" stroke="#000" stroke-width="2.5"/>
  <text x="745" y="494" font-size="10" fill="#333">Ground (Black)</text>
  <line x1="710" y1="508" x2="740" y2="508" stroke="#ccaa00" stroke-width="2.5"/>
  <text x="745" y="512" font-size="10" fill="#333">Charging (Yellow)</text>
  <line x1="710" y1="526" x2="740" y2="526" stroke="#660099" stroke-width="2.5"/>
  <text x="745" y="530" font-size="10" fill="#333">Ignition (Purple)</text>
  <line x1="710" y1="544" x2="740" y2="544" stroke="#cc6600" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="745" y="548" font-size="10" fill="#333">Signal/Sense (dashed)</text>
</svg>
